<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cabinet Médical</title>
    <meta charset="UTF-8">
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            color: white;
        }
        .container-center {
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .box {
            background: rgba(0,0,0,0.4);
            padding: 40px;
            border-radius: 15px;
        }
        h1 {
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container-center">
    <div class="box">
        <h1>Bienvenue dans notre Cabinet Médical 🏥</h1>
        <p class="mt-3">
            Gestion des patients, rendez-vous et ordonnances en toute simplicité.
        </p>

        <a href="/login" class="btn btn-light mt-4">Se connecter</a>
		<a href="/register" class="btn btn-outline-light px-4">S'inscrire</a>
    </div>
</div>

</body>
</html>
