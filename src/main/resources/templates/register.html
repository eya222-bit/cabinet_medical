<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Inscription Patient</title>
</head>
<body>

<h2>Inscription Patient</h2>

<form th:action="@{/register}" method="post" th:object="${patient}">

    CIN: <input type="text" th:field="*{cin}" /><br>
    Nom: <input type="text" th:field="*{nom}" /><br>
    Prénom: <input type="text" th:field="*{prenom}" /><br>
    Date naissance: <input type="date" th:field="*{dateNaissance}" /><br>
    Téléphone: <input type="text" th:field="*{telephone}" /><br>
    Email: <input type="email" th:field="*{email}" /><br>
    Mot de passe: <input type="password" name="password" required /><br>
	Nom d'utilisateur: <input type="text" name="username" required /><br>

    <button type="submit">S'inscrire</button>
</form>

</body>
</html>
