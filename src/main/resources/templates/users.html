<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>


<div th:fragment="content">
<h2>Liste des utilisateurs</h2>

<table border="1">
<tr>
    <th>ID</th>
    <th>Username</th>
</tr>

<tr th:each="u : ${users}">
    <td th:text="${u.id}"></td>
    <td th:text="${u.username}"></td>
</tr>

</table>
</div>
</body>
</html>
